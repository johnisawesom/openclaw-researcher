name: Weekly Research Run

on:
  schedule:
    # Every Monday at 9am AEST (UTC+10) = Sunday 11pm UTC
    - cron: '0 23 * * 0'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions tab

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Researcher Bot
        run: |
          curl -X POST "${{ secrets.RESEARCHER_BOT_URL }}/run" \
            -H "Content-Type: application/json" \
            --max-time 30 \
            --fail
