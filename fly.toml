app = "openclaw-researcher"
primary_region = "syd"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  min_machines_running = 1
  wait_timeout = "120s"

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    path = "/health"
    timeout = "10s"

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 1
